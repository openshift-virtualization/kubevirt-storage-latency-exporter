apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: kubevirt-metrics-exporter
  namespace: kubevirt-metrics-exporter
  labels:
    app: kubevirt-metrics-exporter
spec:
  config:
    display:
      name: KubeVirt Storage Latency
      description: Storage I/O latency from QMP and eBPF subsystems
    duration: 1h


    variables:
      - kind: ListVariable
        spec:
          name: node
          display:
            name: Node
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: node
              matchers:
                - "kube_node_info{}"

      - kind: ListVariable
        spec:
          name: namespace
          display:
            name: Namespace
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: namespace
              matchers:
                - "kube_namespace_labels{}"

      - kind: ListVariable
        spec:
          name: vmi
          display:
            name: VMI
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: name
              matchers:
                - 'kubevirt_vmi_info{node=~"$node", namespace=~"$namespace"}'

      - kind: ListVariable
        spec:
          name: persistentvolumeclaim
          display:
            name: Volume
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: persistentvolumeclaim
              matchers:
                - 'kube_persistentvolumeclaim_info{namespace=~"$namespace"}'

      - kind: ListVariable
        spec:
          name: operation
          display:
            name: Operation
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: StaticListVariable
            spec:
              values:
                - read
                - write
                - flush
                - discard
                - open
                - getattr

      - kind: ListVariable
        spec:
          name: interval
          display:
            name: Rate Interval
          allowAllValue: false
          allowMultiple: false
          defaultValue: "5m"
          plugin:
            kind: StaticListVariable
            spec:
              values:
                - "1m"
                - "2m"
                - "5m"
                - "10m"

    panels:
      qmp_ratio:
        kind: Panel
        spec:
          display:
            name: QEMU to Device
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                show: true
                format:
                  unit: percent
              legend:
                position: bottom
                mode: table
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: '(sum by (node) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) - sum by (node) (rate(kubevirt_vmi_storage_io_latency_seconds_bucket{le="0.01", node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]))) / sum by (node) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) * 100'
                    minStep: "30s"
                    seriesNameFormat: "> 10ms ({{node}})"
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: '(sum by (node) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) - sum by (node) (rate(kubevirt_vmi_storage_io_latency_seconds_bucket{le="0.1", node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]))) / sum by (node) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) * 100'
                    minStep: "30s"
                    seriesNameFormat: "> 100ms ({{node}})"
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: '(sum by (node) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) - sum by (node) (rate(kubevirt_vmi_storage_io_latency_seconds_bucket{le="1", node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]))) / sum by (node) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) * 100'
                    minStep: "30s"
                    seriesNameFormat: "> 1s ({{node}})"

      qmp_p99:
        kind: Panel
        spec:
          display:
            name: QEMU to Device (p99)
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                show: true
                format:
