                    query: '(sum by (node) (rate(kme_block_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")) - sum by (node) (rate(kme_block_io_latency_seconds_bucket{le="0.1", node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)"))) / sum by (node) (rate(kme_block_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")) * 100'
